name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - name: Install desktop test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            imagemagick \
            x11vnc \
            xdotool \
            xterm \
            xvfb

      - name: Ensure a headed browser is available
        run: |
          if command -v google-chrome-stable >/dev/null \
            || command -v chromium >/dev/null \
            || command -v chromium-browser >/dev/null; then
            echo "browser already present"
          else
            wget -q -O /tmp/google-chrome.deb \
              https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get install -y --no-install-recommends /tmp/google-chrome.deb
          fi
          command -v google-chrome-stable \
            || command -v chromium \
            || command -v chromium-browser

      - run: bun run test
        env:
          PICKLAB_REQUIRE_BROWSER: "1"
          PICKLAB_CHROME_NO_SANDBOX: "1"

      - run: bun run build

      - name: Upload sourcemaps to Sentry
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: pickforge
          SENTRY_PROJECT: picklab
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set; skipping"
            exit 0
          fi
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          if ! {
            npx --yes @sentry/cli sourcemaps inject packages/cli/dist &&
            npx --yes @sentry/cli sourcemaps upload --release "picklab@$VERSION" packages/cli/dist
          }; then
            echo "::warning::Sentry sourcemap upload failed; continuing release"
          fi

      - name: Publish @pickforge/picklab
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/cli
        run: npm publish --access public --provenance

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release create "$RELEASE_TAG" --generate-notes
