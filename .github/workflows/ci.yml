name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git --redact --no-banner /repo

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run lint

      - name: Install desktop test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            imagemagick \
            x11vnc \
            xdotool \
            xterm \
            xvfb

      - name: Ensure a headed browser is available
        run: |
          if command -v google-chrome-stable >/dev/null \
            || command -v chromium >/dev/null \
            || command -v chromium-browser >/dev/null; then
            echo "browser already present"
          else
            wget -q -O /tmp/google-chrome.deb \
              https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get install -y --no-install-recommends /tmp/google-chrome.deb
          fi
          # Fail loudly if no browser resolved — the browser integration test
          # must run, not silently skip.
          command -v google-chrome-stable \
            || command -v chromium \
            || command -v chromium-browser

      # PICKLAB_REQUIRE_BROWSER makes the browser integration test fail rather
      # than skip if prerequisites are missing. PICKLAB_CHROME_NO_SANDBOX keeps
      # headed Chrome reliable on the runner without changing the product
      # default (Chrome's sandbox stays on outside CI).
      - run: bun run test
        env:
          PICKLAB_REQUIRE_BROWSER: "1"
          PICKLAB_CHROME_NO_SANDBOX: "1"

      - run: bun run test:coverage
        env:
          PICKLAB_REQUIRE_BROWSER: "1"
          PICKLAB_CHROME_NO_SANDBOX: "1"

      - name: Summarize coverage
        if: ${{ !cancelled() }}
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("fs");
          if (!fs.existsSync("coverage/lcov.info")) {
            console.log("## Coverage\n\nCoverage report was not generated.");
            process.exit(0);
          }
          const lcov = fs.readFileSync("coverage/lcov.info", "utf8");
          let found = 0;
          let hit = 0;
          for (const line of lcov.split("\n")) {
            if (line.startsWith("LF:")) found += Number(line.slice(3));
            if (line.startsWith("LH:")) hit += Number(line.slice(3));
          }
          const pct = found === 0 ? "0.00" : ((hit / found) * 100).toFixed(2);
          console.log(`## Coverage\n\nLines: ${pct}% (${hit}/${found})`);
          NODE

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/lcov.info
            coverage/index.html
            coverage/
          retention-days: 7

      - run: bun run build
