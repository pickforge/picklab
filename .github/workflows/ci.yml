name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - name: Install desktop test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            imagemagick \
            x11vnc \
            xdotool \
            xterm \
            xvfb

      - run: bun run test

      - run: bun run test:coverage

      - name: Summarize coverage
        if: ${{ !cancelled() }}
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("fs");
          if (!fs.existsSync("coverage/lcov.info")) {
            console.log("## Coverage\n\nCoverage report was not generated.");
            process.exit(0);
          }
          const lcov = fs.readFileSync("coverage/lcov.info", "utf8");
          let found = 0;
          let hit = 0;
          for (const line of lcov.split("\n")) {
            if (line.startsWith("LF:")) found += Number(line.slice(3));
            if (line.startsWith("LH:")) hit += Number(line.slice(3));
          }
          const pct = found === 0 ? "0.00" : ((hit / found) * 100).toFixed(2);
          console.log(`## Coverage\n\nLines: ${pct}% (${hit}/${found})`);
          NODE

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/lcov.info
            coverage/index.html
            coverage/
          retention-days: 7

      - run: bun run build
